<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skelly.icu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#000;color:#fff;overflow:hidden}
.container{width:100%;height:100vh;position:relative}
#background{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}
#profile-block{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:820px;min-height:332px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);padding:20px;border-radius:15px;z-index:20;display:flex;flex-direction:column;gap:15px;backdrop-filter:blur(10px);opacity:1}
.profile-header{display:flex;gap:15px}
.profile-container{width:150px;height:150px}
.profile-picture{width:150px;height:150px;border-radius:50%;object-fit:cover}
.profile-info{flex:1;display:flex;flex-direction:column}
#profile-name{font-size:32px;font-weight:bold}
#profile-bio{color:rgba(255,255,255,.8);font-size:18px}
.bio-separator{width:100%;height:1px;background:rgba(255,255,255,.2);margin:20px 0}
.visitor-counter{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);padding:8px 15px;border-radius:20px;font-size:14px}
.badge-box{background:rgba(255,255,255,.15);padding:2px;border-radius:15px}
.badge-box-inner{background:rgba(0,0,0,.5);padding:5px;border-radius:12px;display:flex}
.badge-group{display:flex;gap:8px}
</style>
</head>
<body>
<div class="container">
<video id="background" autoplay loop muted playsinline>
<source src="assets/background.mp4" type="video/mp4">
</video>

<div id="profile-block">
<div class="profile-header">
<div class="profile-container">
<img src="assets/cat.png" class="profile-picture">
</div>
<div class="profile-info">
<div id="profile-name">skelly</div>
<div class="badge-box">
<div class="badge-box-inner">
<div class="badge-group"></div>
</div>
</div>
<div id="profile-bio">tuff</div>
</div>
</div>

<div class="bio-separator"></div>

<div class="visitor-counter">
<span id="visitor-count">676767</span>
</div>
</div>
</div>
</body>
</html>
